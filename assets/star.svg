<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="800" height="100">
  <style>
    .marquee-text {
      font-family: "Comic Sans", "Comic Sans MS", Chalkboard, ChalkboardSE-Regular, "Marker Felt", Purisa, "URW Chancery L", cursive, sans-serif;
      font-size: 48px;
      font-weight: bold;
      fill: #00BC6E;
      animation: marquee 7s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(800px); }
      100% { transform: translateX(-640px); }
    }
  </style>
  <text class="marquee-text" x="0" y="70" dominant-baseline="middle">GIVE THIS REPO A ⭐</text>
</svg>