    <style>
        .bar {
            animation: soundwave 480ms linear infinite alternate;
            transform-origin: top center;
            /* 关键：从顶部向下生长 */
        }

        /* 每条不同的最大高度和动画速度 */
        .bar:nth-child(10n-1) {
            --h: 28px;
            animation-duration: 380ms;
        }

        .bar:nth-child(10n-2) {
            --h: 28px;
            animation-duration: 520ms;
        }

        .bar:nth-child(10n-3) {
            --h: 38px;
            animation-duration: 410ms;
        }

        .bar:nth-child(10n-4) {
            --h: 24px;
            animation-duration: 460ms;
        }

        .bar:nth-child(10n-5) {
            --h: 42px;
            animation-duration: 370ms;
        }

        .bar:nth-child(10n-6) {
            --h: 32px;
            animation-duration: 490ms;
        }

        .bar:nth-child(10n-7) {
            --h: 32px;
            animation-duration: 430ms;
        }

        .bar:nth-child(8) {
            --h: 36px;
            animation-duration: 395ms;
        }

        .bar:nth-child(10n-9) {
            --h: 29px;
            animation-duration: 475ms;
        }

        .bar:nth-child(10n-10) {
            --h: 19px;
            animation-duration: 355ms;
        }

        @keyframes soundwave {
            0% {
                height: 6px;
                opacity: 0.7;
            }

            100% {
                height: var(--h, 32px);
                opacity: 1;
            }
        }
